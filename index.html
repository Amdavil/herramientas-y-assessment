<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialista 2026 - Los Pibes de la 12</title>
<style>
:root {
  --azul:#0d1b2a;--azul2:#1b2d45;--azul3:#2d4a6b;
  --verde:#2d6a4f;--verde2:#40916c;
  --dorado:#f4a827;--dorado2:#ffd166;
  --blanco:#ffffff;--gris:#8d99ae;--gris2:#c8d0e0;
  --rojo:#e63946;--exito:#06d6a0;
  --r:10px;--sombra:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--azul);color:var(--blanco);min-height:100vh}
a,a:visited{color:var(--dorado);text-decoration:none;cursor:pointer}
input,select,textarea{font-family:inherit}
/* NAV */
nav{background:linear-gradient(135deg,var(--azul2),var(--azul3));border-bottom:3px solid var(--dorado);padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:var(--sombra)}
.nav-inner{max-width:1140px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:58px;gap:8px}
.nav-brand{font-size:.95rem;font-weight:800;color:var(--dorado);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-links{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end}
.nav-btn{background:transparent;border:none;color:var(--gris2);cursor:pointer;padding:5px 8px;border-radius:6px;font-size:.78rem;font-weight:600;transition:.2s;white-space:nowrap}
.nav-btn:hover,.nav-btn.activo{background:var(--dorado);color:var(--azul)}
.nav-user{font-size:.73rem;color:var(--dorado2);padding:3px 8px;border:1px solid var(--dorado);border-radius:20px;white-space:nowrap}
/* LAYOUT */
main{max-width:1140px;margin:auto;padding:18px 14px 60px}
.card{background:var(--azul2);border-radius:var(--r);padding:18px;box-shadow:var(--sombra);border:1px solid rgba(255,255,255,.06)}
.card-titulo{font-size:1.05rem;font-weight:700;color:var(--dorado);margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* HERO */
.hero{text-align:center;padding:36px 18px;background:linear-gradient(135deg,var(--azul2),var(--verde));border-radius:var(--r);margin-bottom:20px;border:2px solid var(--dorado);position:relative;overflow:hidden}
.hero::before{content:'⚽';font-size:110px;position:absolute;right:-14px;top:-14px;opacity:.07;pointer-events:none}
.hero h1{font-size:clamp(1.3rem,4vw,2rem);font-weight:900;color:var(--dorado)}
.hero h2{font-size:clamp(.9rem,2.5vw,1.35rem);color:var(--blanco);margin-top:5px;font-weight:600}
.hero p{color:var(--gris2);margin-top:7px;font-size:.88rem}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-top:18px}
.hero-stat{background:rgba(0,0,0,.3);border-radius:8px;padding:11px;border:1px solid rgba(244,168,39,.25)}
.hero-stat .num{font-size:1.6rem;font-weight:900;color:var(--dorado)}
.hero-stat .lab{font-size:.7rem;color:var(--gris2);text-transform:uppercase;letter-spacing:.4px}
/* BOTONES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.86rem;transition:.2s;text-align:center;justify-content:center}
.btn-dorado{background:var(--dorado);color:var(--azul)}.btn-dorado:hover{background:var(--dorado2)}
.btn-verde{background:var(--verde);color:var(--blanco)}.btn-verde:hover{background:var(--verde2)}
.btn-gris{background:var(--azul3);color:var(--blanco)}.btn-gris:hover{background:var(--azul2)}
.btn-rojo{background:var(--rojo);color:var(--blanco)}.btn-rojo:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:.76rem}
.btn-lg{padding:12px 24px;font-size:.93rem}
.btn-bloque{width:100%}
/* FORMS */
.form-grupo{margin-bottom:12px}
.form-grupo label{display:block;font-size:.76rem;font-weight:600;color:var(--gris2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;background:var(--azul);border:1.5px solid var(--azul3);border-radius:8px;padding:9px 12px;color:var(--blanco);font-size:.91rem;transition:.2s}
.form-control:focus{outline:none;border-color:var(--dorado)}
.form-control::placeholder{color:var(--gris)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
/* ALERTAS */
.alerta{padding:10px 14px;border-radius:8px;font-size:.86rem;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.alerta-exito{background:rgba(6,214,160,.15);border:1px solid var(--exito);color:var(--exito)}
.alerta-error{background:rgba(230,57,70,.15);border:1px solid var(--rojo);color:var(--rojo)}
.alerta-info{background:rgba(244,168,39,.12);border:1px solid var(--dorado);color:var(--dorado2)}
/* TABLAS */
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{background:rgba(0,0,0,.3);color:var(--dorado);text-align:left;padding:8px 10px;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover td{background:rgba(255,255,255,.02)}
.pos-1 td:first-child{color:var(--dorado);font-weight:900}
.pos-2 td:first-child{color:#c0c0c0;font-weight:700}
.pos-3 td:first-child{color:#cd7f32;font-weight:700}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.68rem;font-weight:700}
.badge-lider{background:var(--dorado);color:var(--azul)}
.badge-verde{background:var(--verde);color:var(--blanco)}
.badge-gris{background:var(--azul3);color:var(--gris2)}
.badge-rojo{background:var(--rojo);color:var(--blanco)}
/* PARTIDO CARD */
.partido-card{background:var(--azul);border-radius:8px;padding:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,.07);transition:.2s}
.partido-card:hover{border-color:rgba(244,168,39,.35)}
.partido-info{display:flex;align-items:center;gap:7px;justify-content:space-between;flex-wrap:wrap}
.partido-equipos{display:flex;align-items:center;gap:7px;flex:1;justify-content:center;min-width:220px}
.equipo-nombre{font-weight:700;font-size:.85rem;text-align:center;flex:1}
.equipo-flag{font-size:1.1rem;line-height:1}
.marcador-inputs{display:flex;align-items:center;gap:4px}
.marcador-inputs input{width:40px;text-align:center;background:var(--azul2);border:1.5px solid var(--azul3);border-radius:6px;color:var(--blanco);padding:5px 3px;font-size:.98rem;font-weight:700}
.marcador-inputs input:focus{outline:none;border-color:var(--dorado)}
.marcador-inputs span{color:var(--gris);font-weight:700;font-size:.9rem}
.partido-meta{font-size:.7rem;color:var(--gris)}
.partido-bloqueado{opacity:.5;pointer-events:none}
.partido-jugado{border-left:3px solid var(--exito)}
.resultado-real{background:rgba(6,214,160,.12);border-radius:4px;padding:2px 7px;font-weight:700;color:var(--exito);font-size:.84rem;display:inline-block}
/* BRACKET */
.bracket-equipo{display:flex;align-items:center;gap:6px;padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.84rem;font-weight:600}
.bracket-equipo:last-child{border-bottom:none}
.bracket-equipo.ganador{background:rgba(244,168,39,.1);color:var(--dorado)}
.bracket-equipo .goles{font-weight:900;color:var(--dorado);margin-left:auto;padding-left:8px}
.bracket-match-card{background:var(--azul);border-radius:8px;border:1px solid var(--azul3);overflow:hidden;margin-bottom:8px}
.bracket-match-card:hover{border-color:rgba(244,168,39,.3)}
/* PROGRESO */
.progress-bar{background:var(--azul3);border-radius:20px;height:7px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--verde),var(--verde2));transition:.5s}
/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px}
.tab{background:var(--azul);border:1px solid var(--azul3);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--gris2);transition:.2s;white-space:nowrap;flex-shrink:0}
.tab.activo,.tab:hover{background:var(--dorado);color:var(--azul);border-color:var(--dorado)}
/* ESPECIALES */
.corona{animation:flotar .8s ease-in-out infinite alternate}
@keyframes flotar{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.mensaje-especial{background:linear-gradient(135deg,rgba(244,168,39,.18),rgba(6,214,160,.12));border:2px solid var(--dorado);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:16px}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.admin-action{background:var(--azul);border:1px solid var(--azul3);border-radius:8px;padding:14px;cursor:pointer;text-align:center;transition:.2s}
.admin-action:hover{border-color:var(--dorado);background:rgba(244,168,39,.05)}
.admin-action .icon{font-size:1.6rem;margin-bottom:4px}
.admin-action .lbl{font-size:.78rem;font-weight:600;color:var(--gris2)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--azul2);border-radius:var(--r);padding:20px;max-width:520px;width:100%;border:1px solid var(--azul3);box-shadow:var(--sombra);max-height:90vh;overflow-y:auto}
.modal-titulo{font-size:1rem;font-weight:700;color:var(--dorado);margin-bottom:12px}
.modal-acciones{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
/* UTILS */
@media(max-width:580px){.form-grid{grid-template-columns:1fr}.nav-btn{padding:4px 6px;font-size:.72rem}}
.hidden{display:none!important}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-6{gap:6px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}.fw-700{font-weight:700}
.text-center{text-align:center}.text-dorado{color:var(--dorado)}
.text-gris{color:var(--gris)}.text-exito{color:var(--exito)}
.w-100{width:100%}.separator{border:none;border-top:1px solid rgba(255,255,255,.07);margin:12px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  const f = BANDERAS[e];
  return f ? `${f} ${esc(e)}` : esc(e);

  if (!e || typeof e !== 'string') return '—';

function registrar(nombre,apodo,email,pw) {
  nombre=nombre.trim(); apodo=apodo.trim();
  if (!nombre) return {ok:false,msg:'El nombre es obligatorio'};
  if (!pw||pw.length<4) return {ok:false,msg:'La contraseña debe tener al menos 4 caracteres'};
  if (db.participantes.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase()))
    return {ok:false,msg:'Ya existe un participante con ese nombre'};
  const id='U'+Date.now()+Math.random().toString(36).slice(2,5);
  db.participantes.push({id,nombre,apodo:apodo||nombre,email:email.trim(),pw,
    inscripcion:new Date().toISOString()});
  guardarDB();
  return {ok:true,usuario:{id,nombre,apodo:apodo||nombre,email:email.trim()}};
}

function loginFn(nombre,pw) {
  const p=db.participantes.find(u=>u.nombre.toLowerCase()===nombre.trim().toLowerCase()&&u.pw===pw);

// ═══════════════════════════════════════════════════════════════
// CÁLCULO DE TABLA DE GRUPO (según pronósticos del usuario)
// ═══════════════════════════════════════════════════════════════
function calcTablaGrupo(uid, gid) {
  const t={};
  GRUPOS[gid].equipos.forEach(e=>{t[e]={e,pts:0,j:0,g:0,em:0,p:0,gf:0,gc:0,dg:0};});
  PARTIDOS_GRUPOS.filter(p=>p.grupo===gid).forEach(p=>{
    const pron=getPGrupo(uid,p.id); if(!pron) return;
    const {local:gl,visitante:gv}=pron;
    const loc=t[p.equipoLocal],vis=t[p.equipoVisitante];
    if(!loc||!vis) return;
    loc.j++;vis.j++;loc.gf+=gl;loc.gc+=gv;vis.gf+=gv;vis.gc+=gl;
    loc.dg=loc.gf-loc.gc; vis.dg=vis.gf-vis.gc;
    if(gl>gv){loc.g++;loc.pts+=3;vis.p++;}
    else if(gl<gv){vis.g++;vis.pts+=3;loc.p++;}
    else{loc.em++;loc.pts++;vis.em++;vis.pts++;}
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.e.localeCompare(b.e));
}

// ═══════════════════════════════════════════════════════════════
// CLASIFICADOS (1°, 2° de cada grupo + 8 mejores terceros)
// ═══════════════════════════════════════════════════════════════
function calcClasificados(uid) {
  const res={primeros:{},segundos:{},terceros:[]};
  Object.keys(GRUPOS).forEach(g=>{
    // ── Solo usar la tabla si el usuario pronosticó al menos 1 partido de este grupo
    const tienePronos = PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(uid,p.id)!==null);
    if (!tienePronos) {
      res.primeros[g]=null;
      res.segundos[g]=null;
      return; // este grupo queda pendiente en el bracket
    }
    const tb=calcTablaGrupo(uid,g);
    res.primeros[g]=tb[0]?.e||null;
    res.segundos[g]=tb[1]?.e||null;
    // Solo agregar tercero si tiene puntos o partidos jugados en sus pronósticos
    if(tb[2] && tb[2].j>0) res.terceros.push({...tb[2],grupo:g});
  });
  res.terceros.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  res.mejoresTerceros=res.terceros.slice(0,8);
  return res;
}

// ═══════════════════════════════════════════════════════════════
// RESOLUCIÓN DE SLOTS DEL BRACKET
// Devuelve el nombre del equipo real, o null si no se puede resolver
// ═══════════════════════════════════════════════════════════════
function resolverSlot(slot, uid) {
  // Posición en grupo: '1A', '2B', etc.
  if (/^[12][A-L]$/.test(slot)) {
    const clas=calcClasificados(uid);
    return slot[0]==='1' ? (clas.primeros[slot[1]]||null) : (clas.segundos[slot[1]]||null);
  }
  // Mejor tercero: 'M3°-1' .. 'M3°-8'
  if (slot.startsWith('M3°-')) {
    const clas=calcClasificados(uid);
    const idx=parseInt(slot.replace('M3°-',''))-1;
    return clas.mejoresTerceros[idx]?.e||null;
  }
  // Ganadores/perdedores de rondas anteriores
  if (slot.startsWith('WR32-')) return resolverGanador('R32-'+slot.slice(5),uid,false);
  if (slot.startsWith('WR16-')) return resolverGanador('R16-'+slot.slice(5),uid,false);
  if (slot.startsWith('WQF-'))  return resolverGanador('QF-'+slot.slice(4),uid,false);
  if (slot.startsWith('WSF-'))  return resolverGanador('SF-'+slot.slice(4),uid,false);
  if (slot.startsWith('LSF-'))  return resolverGanador('SF-'+slot.slice(4),uid,true);
  return null;
}

// Devuelve equipo ganador (o perdedor si perdedor=true) de un partido eliminatorio
// Devuelve null si falta pronóstico o si el partido anterior no tiene equipos
function resolverGanador(matchId, uid, perdedor) {
  const match=PARTIDOS_ELIMINATORIAS.find(m=>m.id===matchId);
  if (!match) return null;
  // Primero resolver qué equipos juegan este partido
  const e1=resolverSlot(match.slot1,uid);
  const e2=resolverSlot(match.slot2,uid);
  if (!e1||!e2) return null; // equipos de ronda anterior aún no determinados
  // Ver si el usuario pronosticó este partido
  const pron=getPElim(uid,matchId);
  if (!pron||!pron.ganador) return null; // sin pronóstico aún
  if (perdedor) return pron.ganador==='local'?e2:e1;
  return pron.ganador==='local'?e1:e2;
}

// ═══════════════════════════════════════════════════════════════
// TABLA CLASIFICADOS REALES (basada en resultados del admin)
// ═══════════════════════════════════════════════════════════════
function calcClasificadosReales() {
  const res={primeros:{},segundos:{},terceros:[],mejoresTerceros:[]};
  Object.keys(GRUPOS).forEach(g=>{
    const t={};
    GRUPOS[g].equipos.forEach(e=>{t[e]={e,pts:0,j:0,gf:0,gc:0,dg:0};});
    let hay=false;
    PARTIDOS_GRUPOS.filter(p=>p.grupo===g).forEach(p=>{
      const real=db.resultadosReales[p.id]; if(!real) return; hay=true;
      const {local:gl,visitante:gv}=real;
      const loc=t[p.equipoLocal],vis=t[p.equipoVisitante]; if(!loc||!vis) return;
      loc.j++;vis.j++;loc.gf+=gl;loc.gc+=gv;vis.gf+=gv;vis.gc+=gl;
      loc.dg=loc.gf-loc.gc;vis.dg=vis.gf-vis.gc;
      if(gl>gv){loc.pts+=3;}else if(gl<gv){vis.pts+=3;}else{loc.pts++;vis.pts++;}
    });
    if(hay){
      const sorted=Object.values(t).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.e.localeCompare(b.e));
      res.primeros[g]=sorted[0]?.e;
      res.segundos[g]=sorted[1]?.e;
      if(sorted[2]) res.terceros.push({...sorted[2],grupo:g});
    }
  });
  res.terceros.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  res.mejoresTerceros=res.terceros.slice(0,8);
  return res;
}

// ═══════════════════════════════════════════════════════════════
// RECALCULAR PUNTAJES
// ═══════════════════════════════════════════════════════════════
function recalcularPuntajes() {
  const cfg=db.config?.puntajes||CFG_DEFAULT.puntajes;
  const clasReales=calcClasificadosReales();
  db.ranking=db.participantes.map(part=>{
    let pts=0,mExactos=0,rOk=0,cOk=0,campeonOk=false,subOk=false,terceroOk=false;

    // Fase de grupos
    PARTIDOS_GRUPOS.forEach(p=>{
      const real=db.resultadosReales[p.id]; if(!real) return;
      const pron=getPGrupo(part.id,p.id); if(!pron) return;
      const {local:rl,visitante:rv}=real,{local:pl,visitante:pv}=pron;
      if(pl===rl&&pv===rv){
        pts+=cfg.marcadorExacto+cfg.diferenciaGol; mExactos++; rOk++;
      } else {
        const rr=rl>rv?'L':rl<rv?'V':'E', rp=pl>pv?'L':pl<pv?'V':'E';
        if(rr===rp){
          pts+=cfg.resultadoCorrecto; rOk++;
          if((rl-rv)===(pl-pv)) pts+=cfg.diferenciaGol;
        }
      }
    });

    // Clasificados a dieciseisavos
    if(Object.keys(clasReales.primeros).length>0){
      const clasPron=calcClasificados(part.id);
      Object.keys(GRUPOS).forEach(g=>{
        if(clasReales.primeros[g]&&clasPron.primeros[g]===clasReales.primeros[g]){pts+=cfg.clasificadoGrupos;cOk++;}
        if(clasReales.segundos[g]&&clasPron.segundos[g]===clasReales.segundos[g]){pts+=cfg.clasificadoGrupos;cOk++;}
      });
      const tp=(clasPron.mejoresTerceros||[]).map(t=>t.e);
      (clasReales.mejoresTerceros||[]).forEach(t=>{if(tp.includes(t.e)){pts+=cfg.clasificadoGrupos;cOk++;}});
    }

    // Eliminatorias
    const fpPts={dieciseisavos:cfg.avanceDieciseisavos,octavos:cfg.avanceOctavos,
      cuartos:cfg.avanceCuartos,semifinal:cfg.avanceSemis};
    PARTIDOS_ELIMINATORIAS.forEach(p=>{
      const real=db.resultadosReales[p.id]; if(!real) return;
      const pron=getPElim(part.id,p.id); if(!pron?.ganador) return;
      if(p.fase==='tercerPuesto'){if(pron.ganador===real.ganador){pts+=cfg.tercerPuesto;terceroOk=true;}return;}
      if(p.fase==='final'){
        if(pron.ganador===real.ganador){pts+=cfg.campeon;campeonOk=true;}
        // subcampeón: el que perdió la final
        const perdedor=real.ganador==='local'?'visitante':'local';
        if(pron.ganador===perdedor){pts+=cfg.subcampeon;subOk=true;}
        return;
      }
      if(fpPts[p.fase]&&pron.ganador===real.ganador) pts+=fpPts[p.fase];
    });

    return {id:part.id,nombre:part.nombre,apodo:part.apodo,pts,
      marcadoresExactos:mExactos,resultadosOk:rOk,clasificadosOk:cOk,
      campeonOk,subcampeonOk:subOk,terceroOk,actualizado:new Date().toISOString()};
  });
  db.ranking.sort((a,b)=>b.pts-a.pts||b.marcadoresExactos-a.marcadoresExactos||b.resultadosOk-a.resultadosOk||b.clasificadosOk-a.clasificadosOk||a.nombre.localeCompare(b.nombre));
  guardarDB();
}

function progreso(uid) {
  const tG=PARTIDOS_GRUPOS.length, tE=PARTIDOS_ELIMINATORIAS.length;
  const pG=Object.keys(db.pronosticosGrupos[uid]||{}).length;
  const pE=Object.keys(db.pronosticosElim[uid]||{}).length;
  return {total:tG+tE,completos:pG+pE,pct:Math.round(((pG+pE)/(tG+tE))*100),pG,pE,tG,tE};
}

    <p class="text-gris" style="margin-bottom:14px">Necesitas al menos 6 pronósticos de grupos para activar el bracket</p>
    <button class="btn btn-dorado" onclick="navegar('grupos')">Ir a Fase de Grupos</button>
  </div>`;

  // ── Decodifica un slot a texto legible ─────────────────────────
  function descSlot(slot) {
    if (/^1[A-L]$/.test(slot)) return `1° Grupo ${slot[1]}`;
    if (/^2[A-L]$/.test(slot)) return `2° Grupo ${slot[1]}`;
    if (/^M3°-(\d+)$/.test(slot)) return `${slot.replace('M3°-','')}° Mejor 3°`;
    if (slot.startsWith('WR32-')) return `Gan. 16avos P${slot.slice(5)}`;
    if (slot.startsWith('WR16-')) return `Gan. Octavos P${slot.slice(5)}`;
    if (slot.startsWith('WQF-'))  return `Gan. Cuartos P${slot.slice(4)}`;
    if (slot.startsWith('WSF-'))  return `Gan. Semis P${slot.slice(4)}`;
    if (slot.startsWith('LSF-'))  return `Perd. Semis P${slot.slice(4)}`;
    return slot;
  }

  // ── Resumen clasificados por grupo ─────────────────────────────
  const clas=calcClasificados(u.id);
  const totalGruposConPronos=Object.keys(GRUPOS).filter(g=>
    PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(u.id,p.id)!==null)
  ).length;
  const resumenGlobal=`<div class="card mb-16">
    <div class="card-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:5px">
      <span>🗂️ Clasificados Proyectados</span>
      <span style="font-size:.72rem;color:var(--gris2);font-weight:400">${totalGruposConPronos} de 12 grupos pronosticados</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
      ${Object.keys(GRUPOS).map(g=>{
        const p1=clas.primeros[g], p2=clas.segundos[g];
        const hayPronos=PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(u.id,p.id)!==null);
        return `<div style="background:var(--azul);border-radius:7px;padding:9px 11px;border:1px solid ${hayPronos?'rgba(6,214,160,.2)':'rgba(255,255,255,.06)'}">
          <div style="font-size:.68rem;color:var(--dorado);font-weight:700;margin-bottom:5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between">
            <span>Grupo ${g}</span>
            ${hayPronos?'<span style="color:var(--exito);font-size:.65rem">✓ Con pronós.</span>':'<span style="color:var(--gris);font-size:.65rem">⏳ Pendiente</span>'}
          </div>
          <div style="font-size:.82rem;font-weight:700;margin-bottom:3px">${p1?`🥇 ${fl(p1)} ${esc(p1)}`:'<span style="color:var(--gris);font-size:.75rem">— Sin pronósticos —</span>'}</div>
          <div style="font-size:.82rem">${p2?`🥈 ${fl(p2)} ${esc(p2)}`:'<span style="color:var(--gris);font-size:.75rem">—</span>'}</div>
        </div>`;
      }).join('')}
    </div>
    ${clas.mejoresTerceros.length>0?`
    <div style="margin-top:10px">
      <div style="font-size:.7rem;color:var(--gris2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">⭐ 8 Mejores Terceros clasificados:</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${clas.mejoresTerceros.map((t,i)=>`
          <span style="background:rgba(244,168,39,.1);border:1px solid rgba(244,168,39,.3);border-radius:6px;padding:3px 9px;font-size:.78rem;font-weight:600">
            ${i+1}. ${fl(t.e)} ${esc(t.e)} <span style="color:var(--gris);font-size:.7rem">Grp ${t.grupo} · ${t.pts}pts</span>
          </span>`).join('')}
      </div>
    </div>`:''}
  </div>`;

  // ── Tabs de fase ───────────────────────────────────────────────
  const faseTabs=[
    {k:'dieciseisavos',l:'16avos (R32)'},{k:'octavos',l:'Octavos'},{k:'cuartos',l:'Cuartos'},
    {k:'semifinal',l:'Semis'},{k:'tercerPuesto',l:'3er Puesto'},{k:'final',l:'Final 🏆'},
  ];
  const tabs=faseTabs.map(f=>`<div class="tab ${ST.tab===f.k?'activo':''}" onclick="ST.tab='${f.k}';renderApp()">${f.l}</div>`).join('');
  const partidos=PARTIDOS_ELIMINATORIAS.filter(p=>p.fase===ST.tab);

  // ── Render de cada partido ─────────────────────────────────────
  const partHTML=partidos.map(p=>{
    const e1r=resolverSlot(p.slot1,u.id);
    const e2r=resolverSlot(p.slot2,u.id);
    const e1=e1r&&TODOS_EQUIPOS.has(e1r)?e1r:null;
    const e2=e2r&&TODOS_EQUIPOS.has(e2r)?e2r:null;
    const pron=getPElim(u.id,p.id);
    const real=db.resultadosReales[p.id];
    const bloq=p.estado==='bloqueado'||!!real;
    const ambosKnown=!!e1&&!!e2;
    const ganadorAct=pron?.ganador;

    // ── Cabecera del partido ──────────────────────────────────────
    const cabecera=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-bottom:10px">
      <div style="font-size:.7rem;color:var(--gris)">📍 ${p.sede} &nbsp;·&nbsp; 📅 ${fmtF(p.fecha)} &nbsp;⏰ ${p.hora}</div>
      <div>
        ${real?'<span class="badge badge-verde">Jugado</span>':''}
        ${bloq&&!real?'<span class="badge badge-rojo">🔒 Bloqueado</span>':''}
        ${pron&&!bloq&&ambosKnown?'<span class="badge badge-gris">✅ Guardado</span>':''}
      </div>
    </div>`;

    // ── Caso: ambos equipos conocidos ──────────────────────────────
    if (ambosKnown) {
      return `<div class="card mb-16 ${bloq&&!real?'partido-bloqueado':''}">
        ${cabecera}
        <div style="display:flex;align-items:stretch;gap:0;background:var(--azul);border-radius:9px;overflow:hidden;margin-bottom:12px;border:1px solid var(--azul3)">
          <div style="flex:1;padding:13px 14px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;
            ${ganadorAct==='local'?'background:rgba(6,214,160,.08);border-right:2px solid var(--exito)':'border-right:1px solid var(--azul3)'}">
            <div style="font-size:1.6rem">${fl(e1)}</div>
            <div style="font-weight:800;font-size:.92rem;text-align:right">${esc(e1)}</div>
            ${ganadorAct==='local'?'<span class="badge badge-verde">Avanza ✓</span>':''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px;gap:6px;min-width:100px">
            <div style="font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.3px">Marcador</div>
            <div class="marcador-inputs">
              <input type="number" min="0" max="20" value="${pron?pron.local:''}" id="el-${p.id}" placeholder="0"
                ${bloq?'disabled':''} style="width:46px;font-size:1.1rem">
              <span style="font-size:1.1rem">:</span>
              <input type="number" min="0" max="20" value="${pron?pron.visitante:''}" id="ev-${p.id}" placeholder="0"
                ${bloq?'disabled':''} style="width:46px;font-size:1.1rem">
            </div>
            ${real?`<span class="resultado-real" style="font-size:.82rem">Real: ${real.local}-${real.visitante}</span>`:''}
          </div>
          <div style="flex:1;padding:13px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;
            ${ganadorAct==='visitante'?'background:rgba(6,214,160,.08);border-left:2px solid var(--exito)':'border-left:1px solid var(--azul3)'}">
            <div style="font-size:1.6rem">${fl(e2)}</div>
            <div style="font-weight:800;font-size:.92rem">${esc(e2)}</div>
            ${ganadorAct==='visitante'?'<span class="badge badge-verde">Avanza ✓</span>':''}
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:.78rem;color:var(--gris2);font-weight:700;margin-bottom:7px">
            ${p.fase==='tercerPuesto'?'¿Quién gana el partido por el 3er puesto?':'¿Quién avanza? (empate → define por penales)'}
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.86rem;padding:7px 12px;border-radius:7px;border:1.5px solid ${ganadorAct==='local'?'var(--exito)':'var(--azul3)'};background:${ganadorAct==='local'?'rgba(6,214,160,.08)':'transparent'};transition:.2s">
              <input type="radio" name="gan-${p.id}" value="local" ${ganadorAct==='local'?'checked':''} ${bloq?'disabled':''}
                onchange="previewGanador('${p.id}','local')">
              ${fl(e1)} <strong>${esc(e1)}</strong>
            </label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.86rem;padding:7px 12px;border-radius:7px;border:1.5px solid ${ganadorAct==='visitante'?'var(--exito)':'var(--azul3)'};background:${ganadorAct==='visitante'?'rgba(6,214,160,.08)':'transparent'};transition:.2s">
              <input type="radio" name="gan-${p.id}" value="visitante" ${ganadorAct==='visitante'?'checked':''} ${bloq?'disabled':''}
                onchange="previewGanador('${p.id}','visitante')">
              ${fl(e2)} <strong>${esc(e2)}</strong>
            </label>
          </div>
        </div>
        ${!bloq?`<button class="btn btn-verde btn-sm" onclick="guardarElim('${u.id}','${p.id}')">💾 Guardar pronóstico</button>`:''}
      </div>`;
    }

    // ── Caso: uno o ambos equipos pendientes ──────────────────────
    const slot1Desc=e1?`${fl(e1)} <strong>${esc(e1)}</strong>`:`<span style="color:var(--gris)">⏳ ${esc(descSlot(p.slot1))}</span>`;
    const slot2Desc=e2?`${fl(e2)} <strong>${esc(e2)}</strong>`:`<span style="color:var(--gris)">⏳ ${esc(descSlot(p.slot2))}</span>`;
    // Calcular qué grupos faltan pronosticar para habilitar este partido
    const gruposFaltantes=[];
    [p.slot1,p.slot2].forEach(sl=>{
      if (/^[12]([A-L])$/.test(sl)) {
        const g=sl[1];
        const hayPronos=PARTIDOS_GRUPOS.filter(q=>q.grupo===g).some(q=>getPGrupo(u.id,q.id)!==null);
        if(!hayPronos) gruposFaltantes.push(`Grupo ${g}`);
      }
    });
    return `<div class="card mb-16" style="opacity:.75">
      ${cabecera}
      <div style="display:flex;align-items:center;justify-content:space-between;background:var(--azul);border-radius:9px;padding:14px 16px;border:1px solid var(--azul3);flex-wrap:wrap;gap:8px">
        <div style="font-size:.9rem;font-weight:700">${slot1Desc}</div>
        <div style="font-size:.75rem;color:var(--gris);font-weight:700">VS</div>
        <div style="font-size:.9rem;font-weight:700">${slot2Desc}</div>
      </div>
      <div class="alerta alerta-info mt-8" style="font-size:.76rem">
        ⏳ <strong>Equipos pendientes.</strong>
        ${gruposFaltantes.length>0
          ?`Completa pronósticos de: <strong>${gruposFaltantes.join(', ')}</strong>`
          :'Completa pronósticos de las rondas anteriores para habilitar este partido.'}
      </div>
    </div>`;
  }).join('');

  // ── Progreso del bracket ──────────────────────────────────────
  const totalElim=PARTIDOS_ELIMINATORIAS.length;
  const pronElim=Object.keys(db.pronosticosElim[u.id]||{}).length;
  const pctBracket=Math.round((pronElim/totalElim)*100);

  return `${resumenGlobal}
  <div class="card">
    <div class="card-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:5px">
      <span>🏆 Mi Bracket Eliminatorio</span>
      <span style="font-size:.72rem;color:var(--gris2);font-weight:400">${pronElim}/${totalElim} partidos (${pctBracket}%)</span>
    </div>
    <div class="alerta alerta-info mb-8" style="font-size:.78rem">
      Los equipos se auto-calculan según tus pronósticos de grupos y avanzan ronda a ronda. Selecciona marcador y ganador en cada partido para continuar.
    </div>
    <div class="tabs">${tabs}</div>
    ${partHTML||'<p class="text-gris">No hay partidos en esta fase</p>'}
  </div>`;
}

// Actualiza el highlight del ganador sin re-renderizar todo
function previewGanador(matchId, val) {
  document.querySelectorAll(`label:has(input[name="gan-${matchId}"])`).forEach(lbl=>{
    const isSelected=lbl.querySelector('input').value===val;
    lbl.style.borderColor=isSelected?'var(--exito)':'var(--azul3)';
    lbl.style.background=isSelected?'rgba(6,214,160,.08)':'transparent';
  });
}

function guardarElim(uid, matchId) {
  const gl=document.getElementById(`el-${matchId}`)?.value||'0';
  const gv=document.getElementById(`ev-${matchId}`)?.value||'0';
  let gan=null;
  document.querySelectorAll(`input[name="gan-${matchId}"]`).forEach(r=>{if(r.checked)gan=r.value;});
  const l=parseInt(gl),v=parseInt(gv);
  if(isNaN(l)||isNaN(v)||l<0||v<0){mostrarAlerta('Ingresa marcadores válidos (números ≥ 0)','error');return;}
  let ganFinal=gan;
  if(l>v) ganFinal='local'; else if(v>l) ganFinal='visitante';
  else if(!ganFinal){mostrarAlerta('Con empate debes seleccionar el ganador por penales','error');return;}
  guardarPElim(uid,matchId,l,v,ganFinal);
  mostrarAlerta('✅ Pronóstico guardado — el bracket se actualizó','exito');
  setTimeout(()=>renderApp(),600);
}

        <th>🏆 Campeón</th><th>🥈 Sub.</th><th>Actualizado</th>

}

function doAdminLogin() {
  const pin=document.getElementById('aPIN')?.value;
  if(pin===(db.config?.adminPin||'2026')){ST.adminOk=true;ST.tab='grupos';renderApp();}
  else document.getElementById('aAlert').innerHTML='<div class="alerta alerta-error">❌ PIN incorrecto</div>';
}

function adminGuardar(matchId) {
  const l=parseInt(document.getElementById(`arl-${matchId}`)?.value);
  const v=parseInt(document.getElementById(`arv-${matchId}`)?.value);
  if(isNaN(l)||isNaN(v)||l<0||v<0){mostrarAlerta('Resultado inválido','error');return;}
  const gan=l>v?'local':l<v?'visitante':'empate';
  db.resultadosReales[matchId]={local:l,visitante:v,ganador:gan};
  // Marcar partido como jugado
  [...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].filter(p=>p.id===matchId).forEach(p=>p.estado='jugado');
  guardarDB(); recalcularPuntajes();
  mostrarAlerta(`✅ Resultado guardado: ${l} - ${v}${gan!=='empate'?' → Avanza '+gan:'(empate)'}`, 'exito');
  renderApp();
}

function adminBloquear(matchId) {
  const p=[...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].find(p=>p.id===matchId);
  if(!p) return;
  p.estado=p.estado==='bloqueado'?'pendiente':'bloqueado';
  guardarDB();
  mostrarAlerta(p.estado==='bloqueado'?'🔒 Partido bloqueado':'🔓 Partido desbloqueado','info');
  renderApp();
}

function adminBloquearTodos() {
  [...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].forEach(p=>{if(!db.resultadosReales[p.id])p.estado='bloqueado';});
  guardarDB(); mostrarAlerta('🔒 Todos los partidos bloqueados','info'); renderApp();
}

function adminReiniciar() {
  if(!confirm('⚠️ Primera confirmación: ¿Reiniciar TODOS los datos?')) return;
  if(!confirm('🚨 Segunda confirmación: Esto borrará participantes, pronósticos y resultados. ¿Continuar?')) return;
  localStorage.removeItem('polla26'); localStorage.removeItem('polla26session'); location.reload();
}

function modalParticipantes() {
  const filas=db.participantes.map(p=>`<tr>
    <td>${esc(p.nombre)}</td><td>${esc(p.apodo)}</td><td>${esc(p.email||'—')}</td>
    <td><button class="btn btn-rojo btn-sm" onclick="adminEliminar('${p.id}')">🗑️</button></td>
  </tr>`).join('')||'<tr><td colspan="4" class="text-center text-gris" style="padding:14px">Sin participantes</td></tr>';
  mostrarModal(`<div class="modal-titulo">👥 Participantes (${db.participantes.length})</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Nombre</th><th>Apodo</th><th>Email</th><th></th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>
    <div class="modal-acciones"><button class="btn btn-gris" onclick="cerrarModal()">Cerrar</button></div>`);
}

function adminEliminar(uid) {
  if(!confirm('¿Eliminar este participante y todos sus pronósticos?')) return;
  db.participantes=db.participantes.filter(p=>p.id!==uid);
  delete db.pronosticosGrupos[uid]; delete db.pronosticosElim[uid];
  guardarDB(); recalcularPuntajes(); cerrarModal();
  mostrarAlerta('Participante eliminado','exito'); renderApp();
}

function modalConfig() {
  const cfg=db.config?.puntajes||CFG_DEFAULT.puntajes;
  const campos=[['marcadorExacto','Marcador exacto grupos'],['resultadoCorrecto','Resultado correcto grupos'],
    ['diferenciaGol','Diferencia de gol (bono)'],['clasificadoGrupos','Clasificado a dieciseisavos'],
    ['avanceDieciseisavos','Avance dieciseisavos'],['avanceOctavos','Avance octavos'],
    ['avanceCuartos','Avance cuartos'],['avanceSemis','Avance semis'],
    ['campeon','Campeón'],['subcampeon','Subcampeón'],['tercerPuesto','Tercer puesto']];
  mostrarModal(`<div class="modal-titulo">⚙️ Configurar Puntajes</div>
    <div class="form-grid">${campos.map(([k,l])=>`
      <div class="form-grupo"><label>${l}</label>
        <input class="form-control" id="c-${k}" type="number" min="0" value="${cfg[k]||0}"></div>`).join('')}</div>
    <div class="form-grupo"><label>PIN de Administrador</label>
      <input class="form-control" id="c-pin" type="password" placeholder="Dejar vacío = no cambiar"></div>
    <div class="modal-acciones">
      <button class="btn btn-gris" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-dorado" onclick="guardarConfig()">Guardar Cambios</button>
    </div>`);
}

function guardarConfig() {
  if(!db.config) db.config=JSON.parse(JSON.stringify(CFG_DEFAULT));
  ['marcadorExacto','resultadoCorrecto','diferenciaGol','clasificadoGrupos','avanceDieciseisavos',
   'avanceOctavos','avanceCuartos','avanceSemis','campeon','subcampeon','tercerPuesto'].forEach(k=>{
    const el=document.getElementById(`c-${k}`); if(el) db.config.puntajes[k]=parseInt(el.value)||0;});
  const pin=document.getElementById('c-pin');
  if(pin?.value.trim()) db.config.adminPin=pin.value.trim();
  guardarDB(); recalcularPuntajes(); cerrarModal();
  mostrarAlerta('✅ Configuración guardada y puntajes recalculados','exito');
}

// EXPORTAR CSV
// ═══════════════════════════════════════════════════════════════
function exportTablaCSV() {
  const h=['#','Nombre','Apodo','Puntos','Marcadores Exactos','Result. OK','Clasificados OK','Campeón','Subcampeón'];
  const r=db.ranking.map((x,i)=>[i+1,x.nombre,x.apodo,x.pts,x.marcadoresExactos,x.resultadosOk,x.clasificadosOk,x.campeonOk?'Sí':'No',x.subcampeonOk?'Sí':'No']);
  dlCSV([h,...r],'tabla_posiciones.csv');
}

function exportPronosCSV() {
  const h=['Participante','Partido','Grupo','Local','Visitante','Pron.Local','Pron.Visitante','Real'];
  const r=[];
  db.participantes.forEach(p=>{
    PARTIDOS_GRUPOS.forEach(m=>{
      const pr=getPGrupo(p.id,m.id), re=db.resultadosReales[m.id];
      r.push([p.nombre,m.id,m.grupo,m.equipoLocal,m.equipoVisitante,
        pr!=null?pr.local:'—',pr!=null?pr.visitante:'—',re?`${re.local}-${re.visitante}`:'Pendiente']);
    });
  });
  dlCSV([h,...r],'pronosticos.csv');
}

function dlCSV(data,fname) {
  const csv=data.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; a.click(); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtF(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${d}/${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1]}`;}
function fmtFH(iso){try{return new Date(iso).toLocaleDateString('es',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function nomF(f){return{grupos:'Grupos',dieciseisavos:'16avos',octavos:'Octavos',cuartos:'Cuartos',semifinal:'Semis',tercerPuesto:'3er Puesto',final:'Final'}[f]||f;}

function mostrarAlerta(msg,tipo='info') {
  const old=document.getElementById('alertaF'); if(old) old.remove();
  const div=document.createElement('div'); div.id='alertaF';
  div.style.cssText='position:fixed;top:65px;right:12px;z-index:9999;max-width:290px;animation:fadeIn .25s ease';
  div.innerHTML=`<div class="alerta alerta-${tipo}">${msg}</div>`;
  document.body.appendChild(div); setTimeout(()=>div.remove(),2800);
}

function mostrarModal(html) {
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()"><div class="modal">${html}</div></div>`;}
function cerrarModal(){document.getElementById('modalContainer').innerHTML='';}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  cargarDB();
  restaurarSesion();
  if(ST.usuario&&!db.participantes.find(p=>p.id===ST.usuario.id)){
    ST.usuario=null; localStorage.removeItem('polla26session');
  }
  renderApp();
  // Auto-refresh tabla al cambiar de día
  let dia=new Date().toDateString();
  setInterval(()=>{const h=new Date().toDateString();if(h!==dia){dia=h;recalcularPuntajes();if(ST.vista==='tabla')renderApp();}},60000);
});
</script>
